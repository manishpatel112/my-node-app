version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo "Installing dependencies..."
      - npm ci || npm install
  build:
    commands:
      - echo "No build step needed"
  post_build:
    commands:
      - echo "Build completed at `date`"

artifacts:
  files:
    - '**/*'
  discard-paths: no
